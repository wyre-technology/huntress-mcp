# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - huntressApiKey
      - huntressApiSecret
    properties:
      huntressApiKey:
        type: string
        description: Your Huntress API key
      huntressApiSecret:
        type: string
        description: Your Huntress API secret
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { HUNTRESS_API_KEY: config.huntressApiKey, HUNTRESS_API_SECRET: config.huntressApiSecret, MCP_TRANSPORT: 'stdio' } })
